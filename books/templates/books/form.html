{% extends 'layouts/base.html' %}

{% block content %}
<style>
    .form-page {
        padding: 4rem 0 5rem;
        background: radial-gradient(circle at top right, #fffaf3 0%, var(--bg) 100%);
        min-height: 80vh;
    }

    .form-wrapper {
        max-width: 760px;
        margin: 0 auto;
    }

    .create-card {
        background: white;
        border: 1px solid var(--line);
        border-radius: 2rem;
        padding: 2.4rem;
        box-shadow: 0 20px 50px rgba(57, 43, 25, 0.05);
        position: relative;
    }

    .create-card::after {
        content: "";
        position: absolute;
        top: -1px;
        right: 40px;
        width: 30px;
        height: 50px;
        background: var(--accent);
        clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 85%, 0 100%);
    }

    .form-header {
        margin-bottom: 2.5rem;
        border-bottom: 1px solid var(--line);
        padding-bottom: 1.5rem;
    }

    .form-header h1 {
        font-family: 'Cinzel', serif;
        font-size: 2.5rem;
        color: var(--ink);
        margin: 0;
    }

    .subtitle {
        margin-top: 0.5rem;
        color: var(--muted);
        font-size: 0.95rem;
    }

    .create-card form p,
    .create-card form > div {
        margin: 0 0 1.2rem;
    }

    .create-card label {
        display: inline-block;
        margin-bottom: 0.5rem;
        font-weight: 800;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
    }

    .create-card input,
    .create-card textarea,
    .create-card select {
        width: 100%;
        padding: 1rem;
        border: 1px solid var(--line);
        border-radius: 0.8rem;
        font-family: inherit;
        font-size: 1rem;
        transition: all 0.3s ease;
        background: #fdfdfd;
        color: var(--ink);
        box-sizing: border-box;
    }

    .create-card input:hover,
    .create-card textarea:hover,
    .create-card select:hover {
        background: #fdfdfd;
        color: var(--ink);
    }

    .create-card input:focus,
    .create-card textarea:focus,
    .create-card select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(180, 73, 46, 0.1);
        background: #fdfdfd;
        color: var(--ink);
    }

    .create-card textarea {
        min-height: 130px;
        resize: vertical;
    }

    .create-card input[type="checkbox"] {
        width: auto;
        margin-right: 0.45rem;
    }

    .create-card .errorlist,
    .create-card .errorlist li {
        list-style: none;
        margin: 0.4rem 0 0;
        padding: 0;
    }

    .create-card .errorlist li {
        color: #a11a1a;
        font-size: 0.85rem;
        font-weight: 600;
    }

    .actions {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        margin-top: 2rem;
        padding-top: 2rem;
        border-top: 1px solid var(--line);
    }

    .btn {
        text-decoration: none;
        border-radius: 999px;
        padding: 0.9rem 1.7rem;
        font-weight: 700;
        font-size: 0.95rem;
        transition: all 0.25s ease;
        cursor: pointer;
    }

    .btn-primary {
        background: var(--ink);
        color: white;
        border: 1px solid var(--ink);
    }

    .btn-primary:hover {
        background: var(--accent);
        border-color: var(--accent);
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(180, 73, 46, 0.18);
    }

    .btn-ghost {
        color: var(--muted);
        border: 1px solid var(--line);
        background: white;
    }

    .btn-ghost:hover {
        color: var(--ink);
        border-color: #d7c8af;
        background: #fffcf6;
    }

    @media (max-width: 640px) {
        .create-card {
            padding: 1.5rem;
            border-radius: 1.2rem;
        }

        .form-header h1 {
            font-size: 1.9rem;
        }

        .actions {
            flex-direction: column;
            align-items: stretch;
            gap: 0.8rem;
        }

        .btn {
            text-align: center;
        }
    }
</style>

<main class="form-page">
    <div class="container form-wrapper">
        <section class="create-wrapper">
            <div class="create-card">
                <div class="form-header">
                    <h1>{{ form_title }}</h1>
                    <p class="subtitle">Fill the form below.</p>
                </div>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{form}}
                    <div class="actions">
                        <input class="btn btn-primary" type="submit" value="{{ submit_label }}">
                        <a class="btn btn-ghost" href="{% url 'books.admin' %}">Cancel</a>
                    </div>
                </form>
            </div>
        </section>

        <p style="text-align: center; margin-top: 2.5rem; color: var(--muted); font-size: 0.85rem;">
            Authorized Access Only • Book Haven Management System 2026
        </p>
    </div>
</main>
{% endblock %}
