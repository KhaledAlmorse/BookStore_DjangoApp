{% extends 'layouts/base.html' %}

{% block content %}
<style>
    .form-page {
        padding: 4rem 0 5rem;
        background: radial-gradient(circle at top right, #fffaf3 0%, var(--bg) 100%);
        min-height: 80vh;
    }

    .form-wrapper {
        max-width: 760px;
        margin: 0 auto;
    }

    .create-card {
        background: white;
        border: 1px solid var(--line);
        border-radius: 2rem;
        padding: 3rem;
        box-shadow: 0 20px 50px rgba(57, 43, 25, 0.05);
        position: relative;
    }

    /* The Bookmark Accent */
    .create-card::after {
        content: "";
        position: absolute;
        top: -1px;
        right: 40px;
        width: 30px;
        height: 50px;
        background: var(--accent);
        clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 85%, 0 100%);
    }

    .form-header {
        margin-bottom: 2.5rem;
        border-bottom: 1px solid var(--line);
        padding-bottom: 1.5rem;
    }

    .form-header h1 {
        font-family: 'Cinzel', serif;
        font-size: 2.5rem;
        color: var(--ink);
        margin: 0;
    }

    .subtitle {
        margin-top: 0.5rem;
        color: var(--muted);
        font-size: 0.95rem;
    }

    /* Direct styling for Django's {{ form }} output */
    .create-card form p {
        margin: 0 0 1.5rem;
        display: flex;
        flex-direction: column;
    }

    .create-card label {
        display: inline-block;
        margin-bottom: 0.6rem;
        font-weight: 800;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        order: 1; /* Ensures label stays on top if form structure varies */
    }

    .create-card input,
    .create-card textarea,
    .create-card select {
        order: 2;
        width: 100%;
        padding: 1rem 1.2rem;
        border: 1px solid var(--line);
        border-radius: 0.8rem;
        font-family: 'Manrope', sans-serif;
        font-size: 1rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        background: #fdfdfd;
        color: var(--ink);
    }

    .create-card input:focus,
    .create-card textarea:focus,
    .create-card select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 8px 20px rgba(180, 73, 46, 0.08);
        background: white;
        transform: translateY(-1px);
    }

    .create-card textarea {
        min-height: 130px;
        resize: vertical;
    }

    /* Error Text */
    .create-card .errorlist {
        list-style: none;
        margin: 0.4rem 0 0;
        padding: 0;
        order: 3;
    }

    .create-card .errorlist li {
        color: #a11a1a;
        font-size: 0.8rem;
        font-weight: 700;
    }

    .actions {
        display: flex;
        align-items: center;
        gap: 1.2rem;
        margin-top: 2rem;
        padding-top: 2rem;
        border-top: 1px solid var(--line);
    }

    .btn {
        text-decoration: none;
        border-radius: 50px;
        padding: 1rem 2rem;
        font-weight: 700;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        transition: all 0.25s ease;
        cursor: pointer;
        border: none;
    }

    .btn-submit {
        background: var(--ink);
        color: white;
        flex: 1.2;
    }

    .btn-submit:hover {
        background: var(--accent);
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(180, 73, 46, 0.18);
    }

    .btn-ghost {
        flex: 0.8;
        color: var(--muted);
        border: 1px solid var(--line);
        background: white;
        text-align: center;
    }

    .btn-ghost:hover {
        color: var(--ink);
        border-color: var(--ink);
        background: var(--bg);
    }

    @media (max-width: 640px) {
        .create-card { padding: 2rem 1.5rem; }
        .actions { flex-direction: column; align-items: stretch; }
        .btn { width: 100%; }
    }
</style>

<main class="form-page">
    <div class="container form-wrapper">
        <section class="create-card">
            <div class="form-header">
                <h1>{{ form_title }}</h1>
                <p class="subtitle">Complete the registry details below.</p>
            </div>

            <form method="POST" enctype="multipart/form-data" id="author-form" novalidate>
                {% csrf_token %}
                
                <div class="form-body">
                    {{ form.as_p }}
                </div>

                <div class="actions">
                    <button type="submit" class="btn btn-submit">
                        {{ submit_label|default:"Save Entry" }}
                    </button>
                    <a class="btn btn-ghost" href="{% url 'authors.index' %}">Cancel</a>
                </div>
            </form>
        </section>

        <p style="text-align: center; margin-top: 2.5rem; color: var(--muted); font-size: 0.8rem; letter-spacing: 0.05em;">
            AUTHORIZED ARCHIVE ACCESS • BOOK HAVEN 2026
        </p>
    </div>
</main>
{% endblock %}
